name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR so pushes don't queue up stale jobs.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # husky's `prepare` script no-ops without a .git dir / outside dev installs
      # when this is set, so `npm ci` doesn't fail trying to install git hooks.
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # mongodb-memory-server downloads its own mongod binary on first use.
      # GitHub-hosted runners have outbound internet access, so this works
      # out of the box; caching the download directory just speeds up
      # subsequent runs.
      - name: Cache mongodb-memory-server binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          retention-days: 14

  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 14
